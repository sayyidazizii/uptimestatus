name: Check Site Status

on:
  schedule:
    # Fallback harian. Untuk interval pendek, pakai external cron yang memanggil workflow_dispatch.
    # Cron GitHub berbasis UTC; 18:00 UTC = 01:00 WIB.
    - cron: "0 18 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "data/sites.json"

permissions:
  contents: write

concurrency:
  group: check-site-status
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Jakarta
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Jalankan pengecekan status
        env:
          ZAWA_BASE_URL: ${{ secrets.ZAWA_BASE_URL }}
          ZAWA_SESSION_ID: ${{ secrets.ZAWA_SESSION_ID }}
          ZAWA_SESSION_KEY: ${{ secrets.ZAWA_SESSION_KEY }}
          ZAWA_NOTIFY_PHONE: ${{ secrets.ZAWA_NOTIFY_PHONE }}
          ZAWA_NOTIFY_GROUP: ${{ secrets.ZAWA_NOTIFY_GROUP }}
        run: node scripts/check-sites.js

      - name: Commit hasil status terbaru
        run: |
          git config user.name "uptime-bot"
          git config user.email "uptime-bot@users.noreply.github.com"
          git add data/status.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan status untuk di-commit."
          else
            git commit -m "chore: update status [skip ci]"
            git push
          fi
